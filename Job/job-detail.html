<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details - JobHunt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { 'sans': ['Plus Jakarta Sans', 'sans-serif'] }, colors: { primary: { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af' } } } }
        }
    </script>
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-50 font-sans antialiased">

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="flex items-center space-x-3">
                    <div class="w-11 h-11 bg-gradient-to-br from-primary-500 to-primary-700 rounded-xl flex items-center justify-center shadow-lg shadow-primary-500/30">
                        <i class="fas fa-briefcase text-white text-lg"></i>
                    </div>
                    <span class="text-2xl font-extrabold text-gray-900">Job<span class="text-primary-500">Hunt</span></span>
                </a>
                <div class="hidden lg:flex items-center space-x-4">
                    <a href="index.html" class="px-4 py-2 text-sm font-semibold text-gray-600 hover:text-primary-600 transition-all">Home</a>
                    <a href="jobs.html" class="px-4 py-2 text-sm font-semibold text-gray-600 hover:text-primary-600 transition-all">Find Jobs</a>
                    <a href="admin.html" class="px-4 py-2 text-sm font-semibold text-gray-600 hover:text-primary-600 transition-all">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Job Detail Content -->
    <main class="pt-28 pb-16">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Breadcrumb -->
            <nav class="mb-6 text-sm">
                <ol class="flex items-center space-x-2 text-gray-500">
                    <li><a href="index.html" class="hover:text-primary-600 transition-colors">Home</a></li>
                    <li><i class="fas fa-chevron-right text-xs"></i></li>
                    <li><a href="jobs.html" class="hover:text-primary-600 transition-colors">Jobs</a></li>
                    <li><i class="fas fa-chevron-right text-xs"></i></li>
                    <li class="text-gray-900 font-semibold" id="breadcrumb-title">Loading...</li>
                </ol>
            </nav>

            <div class="grid lg:grid-cols-3 gap-8">
                <!-- Main Content -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100" id="job-detail-content">
                        <div class="flex justify-center py-12">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 sticky top-24" id="job-sidebar">
                        <div class="flex justify-center py-8">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm">© 2024 JobHunt. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/job-detail.js"></script>
</body>
</html>
